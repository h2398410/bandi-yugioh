<!doctype html>
<html lang="zh-Hant">

  <style>

      --cardW:160px; --radius:14px;
    }
    body{ margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: radial-gradient(1200px 800px at 30% 0%, #18233a 0%, var(--bg) 55%); color:var(--text); }
    
    header{ z-index: 10; background: color-mix(in oklab, var(--bg) 85%, transparent); border-bottom: 1px solid rgba(255,255,255,.08); }
    .wrap{ max-width: 1200px; margin:0 auto; padding: 12px 16px 16px; }
    h1{ font-size: 16px; margin: 0 0 4px; letter-spacing:.2px; }
    .sub{ color: var(--muted); font-size: 12px; line-height:1.3; }
    
    .toolbar{ display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-top:10px; }
    .pill{ background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.10);
      padding: 6px 10px; border-radius: 999px; display:flex; gap:6px; align-items:center; }
    .pill label{ color: var(--muted); font-size: 12px; white-space: nowrap; }
    input[type="search"]{ width: 180px; max-width: 40vw; background: transparent; border: none; color: var(--text);
      outline: none; font-size: 13px; }
    select, button{ background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.10);
      color: var(--text); border-radius: 8px; padding: 6px 8px; font-size: 12px; cursor:pointer; }
    button.primary{ border-color: color-mix(in oklab, var(--accent) 35%, rgba(255,255,255,.10));
      background: color-mix(in oklab, var(--accent) 18%, rgba(255,255,255,.06)); }
    button.danger{ border-color: color-mix(in oklab, var(--danger) 35%, rgba(255,255,255,.10));
      background: color-mix(in oklab, var(--danger) 16%, rgba(255,255,255,.06)); }
    
    main .wrap{ padding-top: 10px; }
    .stats{ display:flex; flex-wrap:wrap; gap:8px; align-items:center; color: var(--muted); font-size: 12px; margin: 8px 0 10px; }
    .bar{ height: 8px; width: 180px; max-width: 50vw; border-radius: 999px; background: rgba(255,255,255,.08);
      overflow:hidden; border: 1px solid rgba(255,255,255,.10); }
    .bar > div{ height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.3s ease; }
    
    .grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(var(--cardW), 1fr)); gap: 12px; }
    .card{ background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.10); border-radius: var(--radius); overflow:hidden; cursor:pointer;
      transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,.25); position:relative; user-select:none; }
    .card:hover{ transform: translateY(-2px); border-color: rgba(94,234,212,.35); box-shadow: 0 14px 42px rgba(0,0,0,.35); }
    .thumb{ aspect-ratio: 3 / 4; width: 100%; background: linear-gradient(135deg, rgba(96,165,250,.18), rgba(94,234,212,.12));
      display:flex; align-items:center; justify-content:center; position:relative; }
    .thumb img{ width: 100%; height: 100%; object-fit: cover; display:block; }
    .thumb .placeholder{ padding: 10px; color: rgba(255,255,255,.75); text-align:center; font-size: 12px; line-height:1.35; }
    .meta{ padding: 8px 8px 10px; display:flex; flex-direction:column; gap:4px; background: color-mix(in oklab, var(--panel2) 70%, transparent); }
    .title{ font-size: 12px; line-height:1.2; font-weight: 650; letter-spacing:.15px; }
    .small{ display:flex; gap:6px; flex-wrap:wrap; color: var(--muted); font-size: 11px; align-items:center; }
    .badge{ padding: 1px 6px; border-radius: 999px; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); }
    .ownedMark{ position:absolute; top:6px; right:6px; background: rgba(94,234,212,.14);
      border: 1px solid rgba(94,234,212,.35); color: var(--accent); padding: 2px 6px; border-radius: 999px;
      font-size: 11px; font-weight: 650; display:none; z-index: 2; backdrop-filter: blur(4px); }

    .card.not-owned img{ filter: grayscale(1) brightness(.55) contrast(.95); }
    .card.not-owned::after{ content:""; position:absolute; inset:0;
      background: radial-gradient(600px 240px at 50% 0%, rgba(0,0,0,.12), rgba(0,0,0,.55)); pointer-events:none; }
    .card.owned{ border-color: rgba(94,234,212,.28); }
    .card.owned .ownedMark{ display:block; }

    .footer{ color: var(--muted); font-size: 12px; margin-top: 18px; line-height:1.5; }
    .footer code{ color: #cbd5e1; }
    dialog{ border: 1px solid rgba(255,255,255,.14); border-radius: 14px; background: rgba(10,14,20,.95); color: var(--text);
      max-width: 900px; width: min(900px, 92vw); box-shadow: 0 22px 70px rgba(0,0,0,.6); }
    dialog::backdrop{ background: rgba(0,0,0,.55); }
    textarea{ width:100%; min-height: 220px; border-radius: 12px; padding: 10px; background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12); color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 12px; outline:none; box-sizing: border-box; }
    .dlgActions{ display:flex; gap:10px; justify-content:flex-end; margin-top:10px; flex-wrap:wrap; }

    /* 📱 手機版專屬優化 */
    @media (max-width: 600px) {
      .wrap{ padding: 10px 10px 14px; }
      .sub{ display: none; } /* 隱藏說明省空間 */
      h1{ font-size: 15px; }
      .grid{ grid-template-columns: repeat(2, 1fr); gap: 8px; } /* 固定兩欄 */
      .toolbar{ gap: 6px; }
      .pill{ padding: 4px 8px; }
      input[type="search"]{ width: 100px; }
    }
  </style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>萬代遊戲王卡圖鑑 (全 123 張)</h1>
    <div class="sub">
      點一下卡片切換已擁有。未擁有會變暗；已擁有會點亮。<br>
      含常規卡 118 張與劇場版/促銷特殊卡 5 張（TA1~TA5）。
    </div>

    <div class="toolbar">
      <div class="pill"><label>搜尋</label><input id="q" type="search" placeholder="編號/名稱" /></div>
      <div class="pill">
        <select id="filter">
          <option value="all">全部</option>
          <option value="owned">已擁有</option>
          <option value="missing">未擁有</option>
        </select>
      </div>
      <div class="pill">
        <select id="sort">
          <option value="no-asc">編號↑</option>
          <option value="no-desc">編號↓</option>
          <option value="name-asc">英文 A-Z</option>
        </select>
      </div>
      <button class="primary" id="exportBtn">匯出</button>
      <button id="importBtn">匯入</button>
      <button class="danger" id="resetBtn">重置</button>
    </div>

    <div class="stats">
      <div><span id="countOwned">0</span> / <span id="countTotal">0</span> 已擁有</div>
      <div class="bar" aria-hidden="true"><div id="barFill"></div></div>
      <div id="pct">0%</div>
    </div>
  </div>
</header>

<main>
  <div class="wrap">
    <div id="grid" class="grid"></div>
    <div class="footer">
      完整清單收錄 123 張（#001-#118 + TA1-TA5）。若圖片檔名有特殊後綴，可在程式碼中修改 `SUFFIX`。
    </div>
  </div>
</main>

<dialog id="dlg">
  <form method="dialog">
    <h3 style="margin: 0 0 10px;">JSON 匯出 / 匯入</h3>
    <div class="sub" style="margin-bottom:10px;">
      匯出：複製下面文字存起來。匯入：把之前匯出的 JSON 貼回來後按「套用匯入」。
    </div>
    <textarea id="jsonBox" spellcheck="false"></textarea>
    <div class="dlgActions">
      <button value="cancel">關閉</button>
      <button id="applyImport" class="primary" value="default" type="button">套用匯入</button>
    </div>
  </form>
</dialog>

  }

  const gridEl = document.getElementById("grid");
  const qEl = document.getElementById("q");
  const filterEl = document.getElementById("filter");
  const sortEl = document.getElementById("sort");
  const countOwnedEl = document.getElementById("countOwned");
  const countTotalEl = document.getElementById("countTotal");
  const barFillEl = document.getElementById("barFill");
  const pctEl = document.getElementById("pct");

  function render() {
    const q = qEl.value.trim().toLowerCase();
    const filter = filterEl.value;
    const sort = sortEl.value;

    let list = CARDS.filter(c => {
      const isOwned = ownedSet.has(c.id);
      if (filter === "owned" && !isOwned) return false;
      if (filter === "missing" && isOwned) return false;

      if (!q) return true;
      return c.id.toLowerCase().includes(q) || 
             c.en.toLowerCase().includes(q) || 
             c.jp.toLowerCase().includes(q);
    });

    list.sort((a, b) => {
      if (sort === "no-asc") return a.no - b.no;
      if (sort === "no-desc") return b.no - a.no;
      if (sort === "name-asc") return a.en.localeCompare(b.en);
      return 0;
    });

    gridEl.innerHTML = "";
    list.forEach(c => {
      const isOwned = ownedSet.has(c.id);
      const card = document.createElement("div");
      card.className = `card ${isOwned ? "owned" : "not-owned"}`;
      
      const imgHtml = `<img src="${c.imageUrl}" alt="${c.en}" onerror="this.outerHTML='<div class=\\'placeholder\\'>無圖片<br>#${c.id}</div>'">`;

      card.innerHTML = `
        <div class="ownedMark">✓ 已擁有</div>
        <div class="thumb">${imgHtml}</div>
        <div class="meta">
          <div class="title">#${c.id} ${c.en}</div>
          <div class="small">
            <span class="badge">${c.type || 'Card'}</span>
            <span>${c.jp}</span>
          </div>
        </div>
      `;

      card.addEventListener("click", () => {
        if (ownedSet.has(c.id)) {
          ownedSet.delete(c.id);
        } else {
          ownedSet.add(c.id);
        }
        saveState();
        render();
      });

      gridEl.appendChild(card);
    });

    const ownedCount = CARDS.filter(c => ownedSet.has(c.id)).length;
    const totalCount = CARDS.length;
    const pct = totalCount ? Math.round((ownedCount / totalCount) * 100) : 0;

    countOwnedEl.textContent = ownedCount;
    countTotalEl.textContent = totalCount;
    barFillEl.style.width = pct + "%";
    pctEl.textContent = pct + "%";
  }

  qEl.addEventListener("input", render);
  filterEl.addEventListener("change", render);
  sortEl.addEventListener("change", render);

  const dlg = document.getElementById("dlg");
  const jsonBox = document.getElementById("jsonBox");

  document.getElementById("exportBtn").addEventListener("click", () => {
    jsonBox.value = JSON.stringify([...ownedSet], null, 2);
    dlg.showModal();
  });

  document.getElementById("importBtn").addEventListener("click", () => {
    jsonBox.value = "";
    dlg.showModal();
  });

  document.getElementById("applyImport").addEventListener("click", () => {
    try {
      const arr = JSON.parse(jsonBox.value);
      if (Array.isArray(arr)) {
        ownedSet = new Set(arr);
        saveState();
        render();
        dlg.close();
      } else {
        alert("格式錯誤：請輸入正確的 JSON 陣列格式。");
      }
    } catch (e) {
      alert("解析失敗，請確認貼入的 JSON 內容是否正確。");
    }
  });

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("確定要重置所有收藏紀錄嗎？")) {
      ownedSet.clear();
      saveState();
      render();
    }
  });

  render();
</script>
</body>
</html>
